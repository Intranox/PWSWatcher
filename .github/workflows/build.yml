name: Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true
      - name: Install dependencies
        working-directory: pws_watcher
        run: flutter pub get
      - name: Analyze
        working-directory: pws_watcher
        run: flutter analyze --no-fatal-infos

  # Release APK firmato con il debug keystore - nessun segreto necessario.
  # Produce APK piccoli (~20-30 MB) installabili sul telefono per test.
  build-test-apk:
    name: Build Test APK
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true
      - name: Install dependencies
        working-directory: pws_watcher
        run: flutter pub get
      - name: Build release APKs (split per ABI, debug-signed)
        working-directory: pws_watcher
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --no-tree-shake-icons
      - name: Upload test APKs
        uses: actions/upload-artifact@v4
        with:
          name: test-apks-${{ github.sha }}
          path: pws_watcher/build/app/outputs/apk/release/*.apk
          retention-days: 14

  # APK di produzione con il tuo keystore. Solo su master/main.
  build-release:
    name: Build Release APK (production)
    needs: analyze
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true
      - name: Install dependencies
        working-directory: pws_watcher
        run: flutter pub get
      - name: Decode keystore
        working-directory: pws_watcher
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > key.jks
      - name: Build release APKs
        working-directory: pws_watcher
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/debug-info
        env:
          UPLOAD_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASS }}
      - name: Build App Bundle
        working-directory: pws_watcher
        run: |
          flutter build appbundle \
            --release \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/debug-info
        env:
          UPLOAD_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASS }}
      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks-${{ github.sha }}
          path: pws_watcher/build/app/outputs/apk/release/*.apk
          retention-days: 30
      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.sha }}
          path: pws_watcher/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-info-${{ github.sha }}
          path: pws_watcher/build/debug-info/
          retention-days: 90
