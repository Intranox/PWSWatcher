name: Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true
      - name: Install dependencies
        working-directory: pws_watcher
        run: flutter pub get
      - name: Analyze
        working-directory: pws_watcher
        run: flutter analyze --no-fatal-infos

  # -----------------------------------------------------------------------
  # Release APK firmato con il debug keystore (nessun segreto necessario).
  # Questo e' l'APK da scaricare e installare per test: dimensione reale,
  # codice ottimizzato, tree-shaking attivo. Circa 20-30 MB installati.
  # -----------------------------------------------------------------------
  build-test-apk:
    name: Build Test APK
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: pws_watcher
        run: flutter pub get

      - name: Create dummy key.properties (uses debug keystore)
        working-directory: pws_watcher/android
        run: |
          cat > key.properties << 'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=androiddebugkey
          storeFile=${HOME}/.android/debug.keystore
          EOF

      - name: Build release APK (debug-signed, split per ABI)
        working-directory: pws_watcher
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Upload test APKs
        uses: actions/upload-artifact@v4
        with:
          name: test-apks-${{ github.sha }}
          path: pws_watcher/build/app/outputs/apk/release/*.apk
          retention-days: 14

  # -----------------------------------------------------------------------
  # APK di produzione firmato con il tuo keystore.
  # Solo su master/main. Richiede i segreti KEYSTORE_BASE64 + KEYSTORE_PASS.
  # -----------------------------------------------------------------------
  build-release:
    name: Build Release APK (production)
    needs: analyze
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: pws_watcher
        run: flutter pub get

      - name: Decode keystore
        working-directory: pws_watcher
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > key.jks

      - name: Build release APKs
        working-directory: pws_watcher
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --obfuscate \
            --split-debug-info=build/debug-info
        env:
          UPLOAD_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASS }}

      - name: Build App Bundle
        working-directory: pws_watcher
        run: |
          flutter build appbundle \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info
        env:
          UPLOAD_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASS }}

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks-${{ github.sha }}
          path: pws_watcher/build/app/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.sha }}
          path: pws_watcher/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-info-${{ github.sha }}
          path: pws_watcher/build/debug-info/
          retention-days: 90
