name: pws_watcher
description: Mobile application for Personal Weather Station monitoring.

version: 99.99.99+99

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  auto_size_text: 3.0.0
  flutter_svg: 1.1.6
  overlay_support: 2.1.0
  photo_view: 0.14.0
  showcaseview: 2.0.3

  # Icons
  flutter_iconpicker: ^3.2.0
  font_awesome_flutter: 10.7.0

  # Networking / data
  http: 0.13.6
  xml: 6.3.0
  connectivity_plus: 4.0.2
  rxdart: 0.27.7

  # Storage
  hive: 2.2.3
  hive_flutter: 1.1.0
  shared_preferences: 2.2.0
  path_provider: 2.1.1

  # Permissions / device
  permission_handler: 10.4.3
  url_launcher: 6.1.14
  in_app_review: 2.0.9

  # Utils
  intl: 0.18.1
  provider: 6.0.5
  get_it: 7.6.4

  # Animations
  flare_flutter: 3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: 2.4.6
  hive_generator: 2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/images/current_weather/
    - assets/flare/
    - assets/values.json
